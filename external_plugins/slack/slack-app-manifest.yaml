_metadata:
  major_version: 1
display_information:
  name: claude-channel
  description: Claude Code messaging bridge — Slack
  long_description: |
    Lets a Claude Code session receive Slack messages and reply, react,
    edit messages, fetch channel history, etc. via MCP tools. Equivalent
    to the Discord bridge plugin but for Slack workspaces. Uses Socket
    Mode so no public URL is required — the bot opens a WebSocket out
    to Slack and receives events bidirectionally.
  background_color: "#4a154b"
features:
  bot_user:
    display_name: claude
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
      # Read channel + thread history (fetch_messages, download_attachment, thread root resolve).
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      # Send messages, including to public channels the bot isn't a member of.
      - chat:write
      - chat:write.public
      # File upload (reply with attachments, send_voice_message) + read for download_attachment.
      - files:read
      - files:write
      # Pins write only — pin_message tool. (Drop pins:read; pins.list isn't called.)
      - pins:write
      # React only — react tool. (Drop reactions:read; the plugin doesn't react to or read reactions.)
      - reactions:write
      # User lookup for get_user_info + display-name annotation. Email is sensitive but
      # opt-in-friendly: drop `users:read.email` if you'd rather not expose workspace emails.
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      # message.* covers @mentions too — separate app_mention subscription is redundant.
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  socket_mode_enabled: true
  org_deploy_enabled: false
  is_hosted: false
  token_rotation_enabled: false
